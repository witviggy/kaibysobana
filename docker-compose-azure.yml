version: "3.8"

services:
  keycloak:
    build: ./keycloak
    image: stitchflowacr.azurecr.io/stitchflow-keycloak:latest
    environment:
      # Admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Host config
      KC_PROXY: edge
      KC_HOSTNAME: kaibysobana-keycloak.purpleisland-0b71ed79.centralindia.azurecontainerapps.io
      KC_HOSTNAME_URL: https://kaibysobana-keycloak.purpleisland-0b71ed79.centralindia.azurecontainerapps.io
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: true
      KC_HTTP_PORT: 8080
      KC_HTTPS_PORT: 8080

      # Database config
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak?sslmode=require
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password

      # CSP & Web Origins
      KC_FRONTEND_URL: https://kaibysobana-frontend.purpleisland-0b71ed79.centralindia.azurecontainerapps.io
      KC_CONTENT_SECURITY_POLICY: >
        frame-ancestors 'self' https://kaibysobana-frontend.purpleisland-0b71ed79.centralindia.azurecontainerapps.io;
        frame-src 'self';
        object-src 'none';
      command: start-dev --import-realm

  backend:
    image: stitchflowacr.azurecr.io/stitchflow-backend:latest
    environment:
      NODE_ENV: production

      DB_HOST: ${AZURE_POSTGRES_HOST}
      DB_PORT: 5432
      DB_NAME: ${AZURE_POSTGRES_DB}
      DB_USER: ${AZURE_POSTGRES_USER}
      DB_PASSWORD: ${AZURE_POSTGRES_PASSWORD}

      DATABASE_URL: postgres://${AZURE_POSTGRES_USER}:${AZURE_POSTGRES_PASSWORD}@${AZURE_POSTGRES_HOST}:5432/${AZURE_POSTGRES_DB}?sslmode=require

      KEYCLOAK_URL: https://${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}

  frontend:
    image: stitchflowacr.azurecr.io/stitchflow-frontend:latest
    environment:
      VITE_API_URL: ${BACKEND_PUBLIC_URL}
      VITE_KEYCLOAK_URL: https://${KEYCLOAK_PUBLIC_URL}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
