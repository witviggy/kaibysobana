version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: stitchflow_keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${AZURE_POSTGRES_HOST}:5432/${KEYCLOAK_DB:-keycloak}?sslmode=require
      KC_DB_USERNAME: ${AZURE_POSTGRES_USER}
      KC_DB_PASSWORD: ${AZURE_POSTGRES_PASSWORD}
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json
    command: start --import-realm  # Use 'start' for production (not dev)
    ports:
      - "8080:8080"

  backend:
    image: stitchflowacr.azurecr.io/stitchflow-backend:latest  # Will be built/pushed
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${AZURE_POSTGRES_HOST}
      - DB_URL=postgres://${AZURE_POSTGRES_USER}:${AZURE_POSTGRES_PASSWORD}@${AZURE_POSTGRES_HOST}:5432/${AZURE_POSTGRES_DB}
      # Other env vars...
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5001:5001"

  frontend:
    image: stitchflowacr.azurecr.io/stitchflow-frontend:latest
    build: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=${BACKEND_URL:-https://<your-app>.azurewebsites.net:5001/api}
      # Adjust URLs for production (use App Service domain)
    ports:
      - "3000:3000"

volumes:
  uploads_data:

networks:
  default:  # App Service handles internal networking