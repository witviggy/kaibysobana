version: "3.8"

services:
  keycloak:
    image: stitchflowacr.azurecr.io/stitchflow-keycloak:latest
    build: ./keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_PROXY: edge
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_URL: https://${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT_HTTPS: "true"

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${AZURE_POSTGRES_HOST}:5432/keycloak?sslmode=require
      KC_DB_USERNAME: ${AZURE_POSTGRES_USER}
      KC_DB_PASSWORD: ${AZURE_POSTGRES_PASSWORD}

  backend:
    image: stitchflowacr.azurecr.io/stitchflow-backend:latest
    environment:
      NODE_ENV: production

      DB_HOST: ${AZURE_POSTGRES_HOST}
      DB_PORT: 5432
      DB_NAME: ${AZURE_POSTGRES_DB}
      DB_USER: ${AZURE_POSTGRES_USER}
      DB_PASSWORD: ${AZURE_POSTGRES_PASSWORD}

      DATABASE_URL: postgres://${AZURE_POSTGRES_USER}:${AZURE_POSTGRES_PASSWORD}@${AZURE_POSTGRES_HOST}:5432/${AZURE_POSTGRES_DB}?sslmode=require

      KEYCLOAK_URL: https://${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}

  frontend:
    image: stitchflowacr.azurecr.io/stitchflow-frontend:latest
    environment:
      VITE_API_URL: ${BACKEND_PUBLIC_URL}
      VITE_KEYCLOAK_URL: https://${KEYCLOAK_PUBLIC_URL}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
