# version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stitchflow_db
    environment:
      POSTGRES_USER: ${AZURE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AZURE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-stitchflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stitchflow-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: stitchflow_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - stitchflow-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: stitchflow_keycloak
    environment:
      KEYCLOAK_ADMIN : ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD : ${KEYCLOAK_ADMIN_PASSWORD}
      # - KC_DB=postgres
      # - KC_DB_URL=jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak}
      # - KC_DB_USERNAME=${POSTGRES_USER:-postgres}
      # - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${AZURE_POSTGRES_HOST}:${AZURE_POSTGRES_PORT}/${KEYCLOAK_DB}?sslmode=require
      KC_DB_USERNAME: ${AZURE_POSTGRES_USER}
      KC_DB_PASSWORD: ${AZURE_POSTGRES_PASSWORD}
    volumes:
      - ./keycloak/realm-config.json:/opt/keycloak/data/import/realm-config.json
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - stitchflow-network

  backend:
    build: ./backend
    container_name: stitchflow_backend
    env_file:
      - ./backend/.env
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=${AZURE_POSTGRES_HOST}
      - DB_URL=postgres://${AZURE_POSTGRES_USER}:${AZURE_POSTGRES_PASSWORD}@${AZURE_POSTGRES_HOST}:${AZURE_POSTGRES_PORT}/${AZURE_POSTGRES_DB}
      - DB_USER=${AZURE_POSTGRES_USER}
      - DB_PASSWORD=${AZURE_POSTGRES_PASSWORD}
      - DB_NAME=${AZURE_POSTGRES_DB}
      - DB_PORT=${AZURE_POSTGRES_PORT}
      - PORT=${PORT}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:5001}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-kai}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - stitchflow-network

  frontend:
    build: ./frontend
    container_name: stitchflow_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${BACKEND_URL:-http://localhost:5001/api}
      - VITE_KEYCLOAK_URL=${KEYCLOAK_URL:-http://localhost:8080}
      - VITE_KEYCLOAK_REALM=${KEYCLOAK_REALM:-kai}
      - VITE_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-kai-frontend}
    depends_on:
      - backend
    networks:
      - stitchflow-network

volumes:
  postgres_data:
  uploads_data:

networks:
  stitchflow-network:
    driver: bridge
